name: CI

on:
  pull_request:
  push:

jobs:
  verify:
    name: Verify (npm ci + verify)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secrets check
        run: npm run secrets:check

      - name: Run tests (CI)
        run: npm run test:ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke (CI)
        env:
          TEST_SEED: "1"
        run: npm run test:e2e:ci

      - name: Run visual snapshots (CI)
        env:
          TEST_SEED: "1"
        run: npm run test:ui:ci

      - name: Run verify
        run: npm run verify
